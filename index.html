<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangentbordstraning - PC (Svensk Layout)</title>
  <style>
    :root {
      --bg-a: #66d9ff;
      --bg-b: #8b5cf6;
      --bg-c: #34d399;
      --ink: #1f1147;
      --card: #ffffffde;
      --key: #f7fbff;
      --edge: #5b6aa0;
      --selected: #ffb703;
      --combo: #fb7185;
      --pressed: #22c55e;
      --chip: #eef2ff;
      --unit: 56px;
      --gap: 6px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Baloo 2", "Trebuchet MS", sans-serif;
      color: var(--ink);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, #ffffff66 0%, #ffffff00 40%),
        radial-gradient(circle at 80% 10%, #fff1 0%, #fff0 35%),
        linear-gradient(130deg, var(--bg-a), var(--bg-b) 55%, var(--bg-c));
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 10px;
      padding: 12px;
    }

    .top, .guide, .practice {
      background: var(--card);
      border: 2px solid #ffffff66;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 10px 25px #2011502b;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.1;
    }

    .small {
      margin: 2px 0 0;
      font-size: 16px;
      opacity: 0.9;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .controls input,
    .controls button,
    .controls a {
      border: 2px solid #8b9ad3;
      border-radius: 10px;
      background: #fff;
      padding: 8px 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      color: var(--ink);
    }

    .controls .hero {
      background: linear-gradient(90deg, #ff7ab6, #ffb347);
      border-color: #ef5da8;
      color: #241142;
      cursor: pointer;
    }

    .presentation {
      display: none;
      margin-top: 8px;
      background: #fff9c4;
      border-radius: 14px;
      border: 2px solid #fde047;
      font-size: clamp(34px, 8vw, 88px);
      font-weight: 800;
      text-align: center;
      padding: 4px 6px;
      letter-spacing: 1px;
    }

    .presentation.show { display: block; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 2px solid #a5b4fc;
      background: var(--chip);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .chip:hover { transform: translateY(-1px); }

    .chip.active {
      background: #fee2e2;
      border-color: #fb7185;
      color: #8b1d3b;
    }

    .guide-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .reset-btn {
      border: 2px solid #a5b4fc;
      background: #fff;
      border-radius: 10px;
      padding: 7px 11px;
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
    }

    .practice {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      font-size: 18px;
      font-weight: 700;
    }

    .result {
      background: #fff;
      border: 2px dashed #86efac;
      border-radius: 12px;
      padding: 8px 10px;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .stage-wrap {
      min-height: 0;
      background: #ffffffcc;
      border-radius: 16px;
      border: 2px solid #ffffff70;
      padding: 10px;
      overflow: auto;
      position: relative;
    }

    .stage {
      width: max-content;
      transform-origin: top left;
      transition: transform 140ms ease;
    }

    .keyboard {
      background: linear-gradient(180deg, #dbe4f7, #c7d4f2);
      border: 2px solid #7b8fc7;
      border-radius: 14px;
      padding: 12px;
      width: max-content;
      box-shadow: 0 16px 30px #180c3f3b;
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      align-items: end;
    }

    .row { display: flex; gap: var(--gap); }

    .main-block {
      display: grid;
      gap: var(--gap);
    }

    .arrow-cluster {
      display: grid;
      gap: var(--gap);
      align-self: end;
      padding-bottom: 2px;
    }

    .arrow-top {
      display: flex;
      justify-content: center;
    }

    .arrow-bottom {
      display: flex;
      gap: var(--gap);
    }

    .key {
      --w: 1;
      width: calc(var(--unit) * var(--w) + var(--gap) * (var(--w) - 1));
      height: var(--unit);
      border-radius: 10px;
      border: 2px solid var(--edge);
      background: linear-gradient(180deg, var(--key), #e6eefb);
      box-shadow: 0 3px 0 #94a3c7;
      font-size: 29px;
      font-weight: 800;
      line-height: 0.95;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 110ms ease, background 150ms ease;
      color: #1e1b4b;
      padding: 4px 2px;
      text-align: center;
      white-space: normal;
      overflow: hidden;
    }

    .key.key-dual { font-size: 19px; line-height: 1.05; }
    .key.key-word { font-size: 22px; }
    .key.key-long { font-size: 18px; }
    .key.key-small { font-size: 24px; }
    .key:hover { transform: translateY(-1px); }

    .key.selected {
      background: linear-gradient(180deg, #ffe29f, #ffbe0b);
      border-color: #d97706;
      animation: pulse 600ms ease;
    }

    .key.combo {
      background: linear-gradient(180deg, #fecdd3, #fb7185);
      border-color: #be123c;
      color: #3f1021;
    }

    .key.pressed {
      background: linear-gradient(180deg, #dcfce7, #4ade80);
      border-color: #15803d;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      30% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @media (max-width: 1100px) {
      .top { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .guide-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <h1 id="selectedLabel">Vald tangent: Mellanslag</h1>
        <p class="small">Svensk PC-layout. Klicka pa tangenter eller tryck pa ditt riktiga tangentbord.</p>
      </div>
      <div class="controls">
        <label><input type="checkbox" id="presentationToggle" /> Presentation</label>
        <button id="fullscreenBtn">Fullscreen</button>
        <a href="mac.html">GA TILL MAC</a>
      </div>
      <div id="presentation" class="presentation">MELLANSLAG</div>
    </div>

    <div class="guide">
      <div class="guide-head">
        <div class="chips" id="symbolChips"></div>
        <button id="resetCombosBtn" class="reset-btn">Rensa kombinationer</button>
      </div>
    </div>

    <div class="practice">
      <div class="result" id="practiceResult">Senaste tecken: -</div>
    </div>

    <div class="stage-wrap" id="stageWrap">
      <div class="stage" id="stage">
        <div class="keyboard" id="keyboard"></div>
      </div>
    </div>
  </div>

  <script>
    const keyRows = [
      [
        { code: "Backquote", label: "½\n§" },
        { code: "Digit1", label: "1\n!" },
        { code: "Digit2", label: "2\n\"" },
        { code: "Digit3", label: "3\n#" },
        { code: "Digit4", label: "4\n¤" },
        { code: "Digit5", label: "5\n%" },
        { code: "Digit6", label: "6\n&" },
        { code: "Digit7", label: "7\n/" },
        { code: "Digit8", label: "8\n(" },
        { code: "Digit9", label: "9\n)" },
        { code: "Digit0", label: "0\n=" },
        { code: "Minus", label: "+\n?" },
        { code: "Equal", label: "´\n`" },
        { code: "Backspace", label: "Backspace", w: 2.8, word: true, long: true }
      ],
      [
        { code: "Tab", label: "Tab", w: 1.5, word: true },
        { code: "KeyQ", label: "Q" },
        { code: "KeyW", label: "W" },
        { code: "KeyE", label: "E" },
        { code: "KeyR", label: "R" },
        { code: "KeyT", label: "T" },
        { code: "KeyY", label: "Y" },
        { code: "KeyU", label: "U" },
        { code: "KeyI", label: "I" },
        { code: "KeyO", label: "O" },
        { code: "KeyP", label: "P" },
        { code: "BracketLeft", label: "Å" },
        { code: "BracketRight", label: "¨\n^" },
        { code: "Enter", label: "Enter", w: 2.1, word: true }
      ],
      [
        { code: "CapsLock", label: "Caps", w: 1.7, word: true },
        { code: "KeyA", label: "A" },
        { code: "KeyS", label: "S" },
        { code: "KeyD", label: "D" },
        { code: "KeyF", label: "F" },
        { code: "KeyG", label: "G" },
        { code: "KeyH", label: "H" },
        { code: "KeyJ", label: "J" },
        { code: "KeyK", label: "K" },
        { code: "KeyL", label: "L" },
        { code: "Semicolon", label: "Ö" },
        { code: "Quote", label: "Ä" },
        { code: "Backslash", label: "'\n*" }
      ],
      [
        { code: "ShiftLeft", label: "⇧", w: 1.5, word: true, alias: "Shift" },
        { code: "IntlBackslash", label: "><" },
        { code: "KeyZ", label: "Z" },
        { code: "KeyX", label: "X" },
        { code: "KeyC", label: "C" },
        { code: "KeyV", label: "V" },
        { code: "KeyB", label: "B" },
        { code: "KeyN", label: "N" },
        { code: "KeyM", label: "M" },
        { code: "Comma", label: ",\n;" },
        { code: "Period", label: ".\n:" },
        { code: "Slash", label: "-\n_" },
        { code: "ShiftRight", label: "⇧", w: 3.5, word: true, alias: "Shift" }
      ],
      [
        { code: "ControlLeft", label: "Ctrl", w: 1.2, word: true },
        { code: "MetaLeft", label: "Win", w: 1.2, word: true },
        { code: "AltLeft", label: "Alt", w: 1.2, word: true },
        { code: "Space", label: "Mellanslag", w: 5.2, word: true },
        { code: "AltRight", label: "AltGr", w: 1.2, word: true },
        { code: "MetaRight", label: "Win", w: 1.2, word: true },
        { code: "ContextMenu", label: "Menu", w: 1.2, word: true },
        { code: "ControlRight", label: "Ctrl", w: 1.2, word: true }
      ]
    ];

    const arrowKeys = {
      top: { code: "ArrowUp", label: "↑", small: true },
      bottom: [
        { code: "ArrowLeft", label: "←", small: true },
        { code: "ArrowDown", label: "↓", small: true },
        { code: "ArrowRight", label: "→", small: true }
      ]
    };

    const symbolGuide = [
      { symbol: '"', help: 'Shift + 2', keys: ["ShiftLeft", "Digit2"] },
      { symbol: "'", help: "Tangenten '/*", keys: ["Backslash"] },
      { symbol: "!", help: "Shift + 1", keys: ["ShiftLeft", "Digit1"] },
      { symbol: ",", help: "Kommatangenten", keys: ["Comma"] },
      { symbol: ";", help: "Shift + ,", keys: ["ShiftLeft", "Comma"] },
      { symbol: "+", help: "+/?-tangenten", keys: ["Minus"] },
      { symbol: "-", help: "-/_-tangenten", keys: ["Slash"] },
      { symbol: "*", help: "Shift + '/*", keys: ["ShiftLeft", "Backslash"] },
      { symbol: "/", help: "Shift + 7", keys: ["ShiftLeft", "Digit7"] },
      { symbol: "(", help: "Shift + 8", keys: ["ShiftLeft", "Digit8"] },
      { symbol: ")", help: "Shift + 9", keys: ["ShiftLeft", "Digit9"] },
      { symbol: "[", help: "AltGr + 8", keys: ["AltRight", "Digit8"] },
      { symbol: "]", help: "AltGr + 9", keys: ["AltRight", "Digit9"] },
      { symbol: "{", help: "AltGr + 7", keys: ["AltRight", "Digit7"] },
      { symbol: "}", help: "AltGr + 0", keys: ["AltRight", "Digit0"] },
      { symbol: ":", help: "Shift + .", keys: ["ShiftLeft", "Period"] },
      { symbol: "_", help: "Shift + -", keys: ["ShiftLeft", "Slash"] },
      { symbol: "@", help: "AltGr + 2", keys: ["AltRight", "Digit2"] },
      { symbol: "#", help: "Shift + 3", keys: ["ShiftLeft", "Digit3"] }
    ];

    const state = {
      selectedCode: "Space",
      selectedSymbol: null,
      elements: new Map(),
      aliases: new Map()
    };

    function makeKeyButton(def) {
      const key = document.createElement("button");
      key.type = "button";
      key.className = "key";
      if (def.word) key.classList.add("key-word");
      if (def.long) key.classList.add("key-long");
      if (def.small) key.classList.add("key-small");
      key.style.setProperty("--w", def.w || 1);
      key.dataset.code = def.code;
      key.innerHTML = def.label.replace(/\n/g, "<br>");
      if (def.label.includes("\n")) key.classList.add("key-dual");

      key.addEventListener("click", () => {
        clearActiveComboOnly();
        selectKey(def.code);
      });

      state.elements.set(def.code, key);
      if (def.alias) state.aliases.set(def.alias.toLowerCase(), def.code);
      state.aliases.set(def.label.replace(/\n/g, "").toLowerCase(), def.code);
      return key;
    }

    function createArrowCluster() {
      const wrap = document.createElement("div");
      wrap.className = "arrow-cluster";

      const top = document.createElement("div");
      top.className = "arrow-top";
      top.appendChild(makeKeyButton(arrowKeys.top));

      const bottom = document.createElement("div");
      bottom.className = "arrow-bottom";
      arrowKeys.bottom.forEach((def) => bottom.appendChild(makeKeyButton(def)));

      wrap.appendChild(top);
      wrap.appendChild(bottom);
      return wrap;
    }

    function buildKeyboard() {
      const root = document.getElementById("keyboard");
      root.innerHTML = "";
      state.elements.clear();
      state.aliases.clear();

      const mainBlock = document.createElement("div");
      mainBlock.className = "main-block";

      keyRows.forEach((row) => {
        const rowEl = document.createElement("div");
        rowEl.className = "row";
        row.forEach((def) => rowEl.appendChild(makeKeyButton(def)));
        mainBlock.appendChild(rowEl);
      });

      root.appendChild(mainBlock);
      root.appendChild(createArrowCluster());
      selectKey("Space");
    }

    function clearMarks() {
      document.querySelectorAll(".key").forEach((k) => {
        k.classList.remove("selected", "combo");
      });
    }

    function keyName(code) {
      const el = state.elements.get(code);
      if (!el) return code;
      return el.textContent.replace(/\s+/g, " ").trim();
    }

    function selectKey(code) {
      if (!state.elements.has(code)) return;
      clearMarks();
      const key = state.elements.get(code);
      key.classList.add("selected");
      state.selectedCode = code;
      const text = `Vald tangent: ${keyName(code)}`;
      document.getElementById("selectedLabel").textContent = text;
      document.getElementById("presentation").textContent = keyName(code).toUpperCase();

      if (state.selectedSymbol) {
        highlightCombo(state.selectedSymbol);
      }
    }

    function pulsePressed(code) {
      const el = state.elements.get(code);
      if (!el) return;
      el.classList.add("pressed");
      setTimeout(() => el.classList.remove("pressed"), 200);
    }

    function addSymbolChips() {
      const root = document.getElementById("symbolChips");
      root.innerHTML = "";
      symbolGuide.forEach((item) => {
        const b = document.createElement("button");
        b.className = "chip";
        b.textContent = item.symbol;
        b.addEventListener("click", () => {
          clearMarks();
          state.selectedCode = null;
          document.querySelectorAll(".key.pressed").forEach((k) => k.classList.remove("pressed"));
          document.getElementById("selectedLabel").textContent = "Vald tangent: Ingen";
          document.getElementById("presentation").textContent = "INGEN";
          document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
          b.classList.add("active");
          state.selectedSymbol = item.symbol;
          highlightCombo(item.symbol);
        });
        root.appendChild(b);
      });
    }

    function highlightCombo(symbol) {
      document.querySelectorAll(".key.combo").forEach((k) => k.classList.remove("combo"));
      const combo = symbolGuide.find((s) => s.symbol === symbol);
      if (!combo) return;
      combo.keys.forEach((code) => {
        if (state.elements.has(code)) state.elements.get(code).classList.add("combo");
      });
    }

    function resetCombos() {
      state.selectedSymbol = null;
      state.selectedCode = null;
      clearMarks();
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      document.querySelectorAll(".key.combo").forEach((k) => k.classList.remove("combo"));
      document.querySelectorAll(".key.pressed").forEach((k) => k.classList.remove("pressed"));
      document.getElementById("selectedLabel").textContent = "Vald tangent: Ingen";
      document.getElementById("presentation").textContent = "INGEN";
      const out = document.getElementById("practiceResult");
      out.textContent = "Senaste tecken: -";
      out.style.borderColor = "#86efac";
    }

    function clearActiveComboOnly() {
      state.selectedSymbol = null;
      document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
      document.querySelectorAll(".key.combo").forEach((k) => k.classList.remove("combo"));
    }

    function updateScale() {
      const wrap = document.getElementById("stageWrap");
      const stage = document.getElementById("stage");
      const kb = document.getElementById("keyboard");
      const scale = Math.min((wrap.clientWidth - 20) / (kb.scrollWidth + 10), (wrap.clientHeight - 20) / (kb.scrollHeight + 10), 1.22);
      stage.style.transform = `scale(${scale})`;
    }

    function setupEvents() {
      document.getElementById("fullscreenBtn").addEventListener("click", async () => {
        try {
          const doc = document;
          const root = document.documentElement;
          if (!doc.fullscreenElement) {
            if (root.requestFullscreen) await root.requestFullscreen();
            else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
          } else {
            if (doc.exitFullscreen) await doc.exitFullscreen();
            else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
          }
          updateScale();
        } catch (err) {
          const out = document.getElementById("practiceResult");
          out.textContent = "Fullscreen blockerad i denna webblasare.";
          out.style.borderColor = "#fb7185";
        }
      });

      document.getElementById("presentationToggle").addEventListener("change", (e) => {
        document.getElementById("presentation").classList.toggle("show", e.target.checked);
        updateScale();
      });

      document.getElementById("resetCombosBtn").addEventListener("click", () => {
        resetCombos();
      });

      window.addEventListener("resize", updateScale);
      window.addEventListener("load", updateScale);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(updateScale);
      }

      window.addEventListener("keydown", (e) => {
        const code = e.code === "NumpadEnter" ? "Enter" : e.code;
        if (state.elements.has(code)) {
          clearActiveComboOnly();
          selectKey(code);
          pulsePressed(code);
        }

        if (e.key && e.key.length === 1) {
          const out = document.getElementById("practiceResult");
          if (state.selectedSymbol) {
            const ok = e.key === state.selectedSymbol;
            out.textContent = ok ? `Ratt! Du skrev ${e.key}` : `Du skrev ${e.key}. Mal: ${state.selectedSymbol}`;
            out.style.borderColor = ok ? "#22c55e" : "#fb7185";
          } else {
            out.textContent = `Senaste tecken: ${e.key}`;
            out.style.borderColor = "#86efac";
          }
        }
      });
    }

    buildKeyboard();
    addSymbolChips();
    setupEvents();
    updateScale();
  </script>
</body>
</html>
